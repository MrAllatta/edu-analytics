project:
  type: website
  output-dir: docs
  
website:
  title: "NYC Education Analytics"
  description: "Data analysis portfolio using NYC Open Data education datasets"
  navbar:
    left:
      - href: output/index.qmd
        text: Home
      - href: output/schools.qmd
        text: Schools
      - href: output/students.qmd
        text: Students
      - href: output/learning.qmd
        text: Learning
      - href: output/about.qmd
        text: About
  sidebar:
    style: "docked"
    search: true
    contents:
      - section: "Data Sources"
        contents:
          - text: "NYC Open Data"
            href: data-sources.qmd
      - section: "Analysis"
        contents:
          - text: schools.qmd
            href: output/schools.qmd
          - students.qmd
          - learning.qmd

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    toc-depth: 3
    code-fold: true
    code-summary: "Show code"
    code-tools: true
    highlight-style: github

execute:
  freeze: auto
  echo: true
  warning: false
  message: false

# R/knitr options
knitr:
  opts_chunk:
    fig.width: 8
    fig.height: 6
    fig.align: center
    out.width: "100%"
